<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CADDesk CST — Faculty Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange:#F47920; --orange-dark:#D4641A;
      --dark:#2E3542; --darker:#232936; --card:#323B4B;
      --border:rgba(255,255,255,0.09);
      --text:#fff; --text2:#B0BAC9; --text3:#7A8499;
      --green:#4CAF82; --red:#E05C6A; --yellow:#F0C040;
      --radius:13px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--darker);color:var(--text);min-height:100vh;}

    /* LOGIN GATE */
    #loginGate{position:fixed;inset:0;background:var(--darker);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
    .gate-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:380px;text-align:center;}
    .gate-box img{height:56px;object-fit:contain;margin-bottom:18px;}
    .gate-box h2{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;}
    .gate-box p{font-size:12px;color:var(--text3);margin-bottom:24px;}
    .gate-box input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;color:#fff;padding:12px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:border-color 0.2s;}
    .gate-box input:focus{border-color:var(--orange);}
    .gate-box button{width:100%;background:var(--orange);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
    .gate-box button:disabled{opacity:0.5;cursor:not-allowed;}
    .gate-error{font-size:12px;color:var(--red);margin-top:-6px;margin-bottom:14px;display:none;}

    /* LAYOUT */
    .topbar{background:var(--dark);border-bottom:2px solid var(--orange);padding:10px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
    .topbar img{height:40px;object-fit:contain;}
    .topbar-divider{width:1px;height:32px;background:var(--border);}
    .topbar-text .t1{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;}
    .topbar-text .t2{font-size:11px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .topbar-right span{font-size:12px;color:var(--text2);}
    .btn-logout-top{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
    .btn-logout-top:hover{border-color:var(--red);color:var(--red);}

    .content{max-width:1100px;margin:0 auto;padding:24px;}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .page-header h1{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;}

    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .stat-card .sv{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:#fff;}
    .stat-card .sv.orange{color:var(--orange);}
    .stat-card .sv.yellow{color:var(--yellow);}
    .stat-card .sl{font-size:12px;color:var(--text3);margin-top:2px;}

    .tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--border);}
    .tab-btn{background:none;border:none;color:var(--text3);font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;}
    .tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}

    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}

    /* Approval queue item */
    .approval-item{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    }
    .approval-item .avatar{
      width:42px;height:42px;background:var(--orange);border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;
      font-weight:700;font-size:18px;color:#fff;flex-shrink:0;
    }
    .approval-info{flex:1;min-width:200px;}
    .approval-info .a-name{font-size:14px;font-weight:600;}
    .approval-info .a-meta{font-size:12px;color:var(--text3);margin-top:2px;}
    .approval-info .a-session{font-size:12px;color:var(--orange);margin-top:4px;font-weight:600;}
    .approval-actions{display:flex;gap:8px;}
    .btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:opacity 0.2s;}
    .btn:hover{opacity:0.85;}
    .btn-green{background:var(--green);color:#fff;}
    .btn-red{background:var(--red);color:#fff;}
    .btn-ghost{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border);}
    .btn-orange{background:var(--orange);color:#fff;}

    /* Student list / detail */
    .student-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s;
    }
    .student-card:hover{border-color:var(--orange);}
    .student-card-top{display:flex;align-items:center;gap:12px;}
    .student-card .avatar{
      width:40px;height:40px;background:var(--orange);border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;
      font-weight:700;font-size:16px;color:#fff;flex-shrink:0;
    }
    .student-card-name{font-size:14px;font-weight:600;}
    .student-card-meta{font-size:11px;color:var(--text3);margin-top:2px;}
    .student-card-progress{margin-top:10px;}
    .mini-bar-track{height:5px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
    .mini-bar-fill{height:100%;background:var(--orange);border-radius:4px;}
    .mini-bar-label{font-size:10px;color:var(--text3);margin-top:4px;}

    /* Session detail modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
    .modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal-header h3{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;}
    .modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;}
    .modal-body{padding:20px 22px;}

    .session-row{
      display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);margin-bottom:8px;
    }
    .session-row .s-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;width:34px;flex-shrink:0;color:var(--text2);}
    .session-row.approved .s-num{color:var(--green);}
    .session-row.pending .s-num{color:var(--yellow);}
    .session-row.locked{opacity:0.45;}
    .session-row-info{flex:1;min-width:0;}
    .session-row-title{font-size:13px;font-weight:500;}
    .session-row-status{font-size:11px;color:var(--text3);margin-top:1px;}
    .session-row-actions{display:flex;gap:6px;flex-shrink:0;}
    .btn-sm{padding:5px 11px;font-size:11px;border-radius:6px;}

    .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
    .empty-state .icon{font-size:32px;margin-bottom:10px;}

    /* Live slots */
    .slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
    .slot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
    .slot-card .sname{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;}
    .slot-card .scount{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:var(--orange);}
    .slot-card .slabel{font-size:10px;color:var(--text3);margin-top:2px;}
    .live-student-row{
      display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;
    }
    .live-student-row .avatar{
      width:34px;height:34px;background:var(--green);border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;
      font-weight:700;font-size:14px;color:#fff;
    }
    .live-student-row .lsr-info{flex:1;min-width:0;}
    .live-student-row .lsr-name{font-size:13px;font-weight:600;}
    .live-student-row .lsr-meta{font-size:11px;color:var(--text3);margin-top:1px;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px var(--green);}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;opacity:0;transition:opacity 0.3s;white-space:nowrap;pointer-events:none;}
    .toast.show{opacity:1;}
    .toast.success{border-color:var(--green);color:var(--green);}
    .toast.error{border-color:var(--red);color:var(--red);}
    .toast.warning{border-color:var(--yellow);color:var(--yellow);}

    @media(max-width:640px){
      .stat-grid{grid-template-columns:repeat(3,1fr);}
      .stat-card .sv{font-size:24px;}
      .approval-item{flex-direction:column;align-items:flex-start;}
      .approval-actions{width:100%;}
      .approval-actions .btn{flex:1;}
    }
  </style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="loginGate">
  <div class="gate-box">
    <h2>Faculty Login</h2>
    <p>CADDesk CST · Session Approval Panel</p>
    <input type="text" id="gateId" placeholder="Faculty ID (e.g. rahul@101)"/>
    <input type="password" id="gatePw" placeholder="Password"/>
    <div class="gate-error" id="gateError">Invalid Faculty ID or Password</div>
    <button id="gateBtn">Login →</button>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar" id="mainUI" style="display:none">
  <div class="topbar-text">
    <div class="t1" id="facultyNameDisplay">Faculty</div>
    <div class="t2">Session Approval Panel</div>
  </div>
  <div class="topbar-right">
    <button class="btn-logout-top" onclick="doFacultyLogout()">Logout</button>
  </div>
</div>

<div class="content" id="mainContent" style="display:none">

  <div class="page-header">
    <h1>Dashboard</h1>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="sv" id="st-students">—</div><div class="sl">Assigned Students</div></div>
    <div class="stat-card"><div class="sv yellow" id="st-pending">—</div><div class="sl">Pending Approvals</div></div>
    <div class="stat-card"><div class="sv orange" id="st-approved">—</div><div class="sl">Sessions Approved</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-pending" onclick="switchFacTab('pending')">⏳ Pending Approvals</button>
    <button class="tab-btn" id="tab-students" onclick="switchFacTab('students')">👤 My Students</button>
    <button class="tab-btn" id="tab-live" onclick="switchFacTab('live')">🟢 Live Now</button>
  </div>

  <!-- LIVE NOW TAB -->
  <div id="facTabLive" style="display:none">
    <div class="slots-grid" id="liveSlotsGrid"></div>
    <div id="liveStudentsList"></div>
  </div>


  <!-- PENDING APPROVALS TAB -->
  <div id="facTabPending">
    <div id="pendingList"><div class="empty-state"><div class="icon">⏳</div>Loading…</div></div>
  </div>

  <!-- MY STUDENTS TAB -->
  <div id="facTabStudents" style="display:none">
    <div id="studentsList"><div class="empty-state"><div class="icon">👤</div>Loading…</div></div>
  </div>

</div>

<!-- STUDENT DETAIL MODAL -->
<div class="modal-overlay" id="studentDetailModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="sdModalTitle">Student</h3>
      <button class="modal-close" onclick="closeStudentDetail()">×</button>
    </div>
    <div class="modal-body" id="sdModalBody">
      <!-- populated dynamically -->
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, updateDoc,
  query, where, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyA5Zo7pCj8KSgExZJyNljNRneHC2X2Vhi8",
  authDomain:"arenacaddcst.firebaseapp.com",
  projectId:"arenacaddcst",
  storageBucket:"arenacaddcst.firebasestorage.app",
  messagingSenderId:"24759325449",
  appId:"1:24759325449:web:d2dd63eafe69b4ce59f9d8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function hashPassword(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

let currentFaculty = null;
let myStudents = [];
let detailStudentId = null;

window.checkFacultyGate = checkFacultyGate;
window.doFacultyLogout = doFacultyLogout;
window.switchFacTab = switchFacTab;
window.openStudentDetail = openStudentDetail;
window.closeStudentDetail = closeStudentDetail;
window.approveSession = approveSession;
window.rejectSession = rejectSession;

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3400);
}

async function checkFacultyGate() {
  const id = document.getElementById('gateId').value.trim();
  const pw = document.getElementById('gatePw').value.trim();
  const errBox = document.getElementById('gateError');
  errBox.style.display = 'none';

  if (!id || !pw) { errBox.textContent = 'Enter Faculty ID and Password'; errBox.style.display = 'block'; return; }

  const btn = document.getElementById('gateBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    // Hash the entered password — new accounts store hashed passwords
    const hashedPw = await hashPassword(pw);

    // Try hashed password first (new accounts), then fall back to plain text (old accounts)
    let snap = await getDocs(query(collection(db, 'cadd_faculty'), where('facultyId', '==', id), where('password', '==', hashedPw)));
    if (snap.empty) {
      // Fallback: old account with plain text password
      snap = await getDocs(query(collection(db, 'cadd_faculty'), where('facultyId', '==', id), where('password', '==', pw)));
    }

    if (snap.empty) {
      errBox.textContent = 'Invalid Faculty ID or Password';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Login →';
      return;
    }
    const d = snap.docs[0];
    currentFaculty = { docId: d.id, ...d.data() };

    if (currentFaculty.status === 'deactivated') {
      errBox.textContent = 'Your account has been deactivated. Contact admin.';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Login →';
      return;
    }

    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('mainUI').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('facultyNameDisplay').textContent = currentFaculty.name;

    await loadDashboard();
  } catch(e) {
    errBox.textContent = 'Error: ' + e.message;
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Login →';
  }
}

document.getElementById('gateBtn').addEventListener('click', checkFacultyGate);
document.getElementById('gatePw').addEventListener('keydown', e => { if(e.key==='Enter') checkFacultyGate(); });
document.getElementById('gateId').addEventListener('keydown', e => { if(e.key==='Enter') checkFacultyGate(); });

function doFacultyLogout() {
  currentFaculty = null; myStudents = [];
  document.getElementById('mainUI').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('gateId').value = '';
  document.getElementById('gatePw').value = '';
  document.getElementById('gateBtn').disabled = false;
  document.getElementById('gateBtn').textContent = 'Login →';
}

async function loadDashboard() {
  const snap = await getDocs(collection(db, 'cadd_students'));
  const allStudents = snap.docs.map(d => ({ docId: d.id, ...d.data() }));

  myStudents = allStudents.filter(s => {
    if (!s.modules) return false;
    return Object.values(s.modules).some(mod =>
      mod.facultyAssignments && mod.facultyAssignments.some(fa => fa.facultyId === currentFaculty.docId)
    );
  });

  renderStats();
  renderPendingApprovals();
  renderMyStudents();
}

function renderStats() {
  let pendingCount = 0, approvedCount = 0;
  myStudents.forEach(s => {
    Object.entries(s.modules || {}).forEach(([modId, mod]) => {
      const isMyModule = mod.facultyAssignments && mod.facultyAssignments.some(fa => fa.facultyId === currentFaculty.docId);
      if (!isMyModule) return;
      Object.values(mod.sessions || {}).forEach(sess => {
        if (sess.approved) approvedCount++;
        else if (sess.studentTicked) pendingCount++;
      });
    });
  });
  document.getElementById('st-students').textContent = myStudents.length;
  document.getElementById('st-pending').textContent = pendingCount;
  document.getElementById('st-approved').textContent = approvedCount;
}

function getMyAssignmentForSession(mod, sessionNum) {
  if (!mod.facultyAssignments) return null;
  return mod.facultyAssignments.find(fa =>
    fa.facultyId === currentFaculty.docId && sessionNum >= fa.fromSession && sessionNum <= fa.toSession
  );
}

function renderPendingApprovals() {
  const wrap = document.getElementById('pendingList');
  const items = [];

  myStudents.forEach(s => {
    Object.entries(s.modules || {}).forEach(([modId, mod]) => {
      Object.entries(mod.sessions || {}).forEach(([numStr, sess]) => {
        const sessionNum = parseInt(numStr);
        if (sess.studentTicked && !sess.approved) {
          const myAssignment = getMyAssignmentForSession(mod, sessionNum);
          if (myAssignment) {
            items.push({ student: s, modId, mod, sessionNum, sess });
          }
        }
      });
    });
  });

  if (!items.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">✅</div>No pending approvals right now — all caught up!</div>';
    return;
  }

  items.sort((a, b) => (a.sess.tickedAt?.seconds || 0) - (b.sess.tickedAt?.seconds || 0));

  wrap.innerHTML = '';
  items.forEach(item => {
    const tickedDate = item.sess.tickedAt ? new Date(item.sess.tickedAt.seconds * 1000) : null;
    const daysAgo = tickedDate ? Math.floor((Date.now() - tickedDate.getTime()) / 86400000) : 0;
    const sessionInfo = getSyllabusSessionInfo(item.modId, item.sessionNum, item.mod.weeks);

    const div = document.createElement('div');
    div.className = 'approval-item';
    div.innerHTML = `
      <div class="avatar">${item.student.name.charAt(0).toUpperCase()}</div>
      <div class="approval-info">
        <div class="a-name">${item.student.name}</div>
        <div class="a-meta">${item.mod.name} · ${item.student.studentId}</div>
        <div class="a-session">Session ${item.sessionNum}: ${sessionInfo.title} ${daysAgo > 0 ? `· ⏰ ${daysAgo}d ago` : '· today'}</div>
      </div>
      <div class="approval-actions">
        <button class="btn btn-green" onclick="approveSession('${item.student.docId}','${item.modId}',${item.sessionNum})">✅ Approve</button>
        <button class="btn btn-red" onclick="rejectSession('${item.student.docId}','${item.modId}',${item.sessionNum})">✕ Reject</button>
      </div>
    `;
    wrap.appendChild(div);
  });
}

function renderMyStudents() {
  const wrap = document.getElementById('studentsList');
  if (!myStudents.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">👤</div>No students assigned to you yet.</div>';
    return;
  }
  wrap.innerHTML = '';
  myStudents.forEach(s => {
    let totalMine = 0, approvedMine = 0;
    const myModuleNames = [];
    Object.entries(s.modules || {}).forEach(([modId, mod]) => {
      const isMine = mod.facultyAssignments && mod.facultyAssignments.some(fa => fa.facultyId === currentFaculty.docId);
      if (!isMine) return;
      myModuleNames.push(mod.name);
      Object.entries(mod.sessions || {}).forEach(([numStr, sess]) => {
        const sessionNum = parseInt(numStr);
        const myAssignment = getMyAssignmentForSession(mod, sessionNum);
        if (myAssignment) {
          totalMine++;
          if (sess.approved) approvedMine++;
        }
      });
    });
    const pct = totalMine ? Math.round((approvedMine / totalMine) * 100) : 0;

    const div = document.createElement('div');
    div.className = 'student-card';
    div.onclick = () => openStudentDetail(s.docId);
    div.innerHTML = `
      <div class="student-card-top">
        <div class="avatar">${s.name.charAt(0).toUpperCase()}</div>
        <div>
          <div class="student-card-name">${s.name}</div>
          <div class="student-card-meta">${myModuleNames.join(', ')} · ${s.studentId}</div>
        </div>
      </div>
      <div class="student-card-progress">

function switchFacTab(tab) {
  document.getElementById('facTabPending').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('facTabStudents').style.display = tab === 'students' ? 'block' : 'none';
  document.getElementById('facTabLive').style.display = tab === 'live' ? 'block' : 'none';
  document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
  document.getElementById('tab-students').classList.toggle('active', tab === 'students');
  document.getElementById('tab-live').classList.toggle('active', tab === 'live');
  if (tab === 'live') loadLiveSlots();
}

// ── LIVE SLOTS (faculty's own students only) ──
// Single equality where() only (checkIn >= todayStart), matching the no-composite-index
// pattern used across this project — checkOut==null and "is this my student" are both
// filtered client-side afterwards.
async function loadLiveSlots() {
  const grid = document.getElementById('liveSlotsGrid');
  const list = document.getElementById('liveStudentsList');
  grid.innerHTML = '<p style="color:var(--text3);grid-column:1/-1">⏳ Loading live slots…</p>';
  list.innerHTML = '';
  try {
    const myDocIds = new Set(myStudents.map(s => s.docId));
    const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
    const q = query(collection(db, 'cadd_attendance'), where('checkIn', '>=', Timestamp.fromDate(todayStart)));
    const snap = await getDocs(q);
    const active = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(r => !r.checkOut && myDocIds.has(r.studentDocId));

    grid.innerHTML = '';
    const slotMap = {};
    active.forEach(r => {
      const s = r.slot || 'Unassigned';
      if (!slotMap[s]) slotMap[s] = 0;
      slotMap[s]++;
    });

    const slotNames = Object.keys(slotMap);
    if (!slotNames.length) {
      grid.innerHTML = '<p style="color:var(--text3);grid-column:1/-1">No students of yours are checked in right now.</p>';
    } else {
      slotNames.forEach(s => {
        const div = document.createElement('div');
        div.className = 'slot-card';
        div.innerHTML = `<div class="sname">${s}</div><div class="scount">${slotMap[s]}</div><div class="slabel">active now</div>`;
        grid.appendChild(div);
      });
    }

    if (active.length) {
      const heading = document.createElement('div');
      heading.style.cssText = 'font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin:18px 0 10px';
      heading.textContent = 'Currently Checked In';
      list.appendChild(heading);

      active.sort((a, b) => b.checkIn.seconds - a.checkIn.seconds).forEach(r => {
        const ci = new Date(r.checkIn.seconds * 1000);
        const row = document.createElement('div');
        row.className = 'live-student-row';
        row.innerHTML = `
          <div class="avatar">${(r.studentName || '?').charAt(0).toUpperCase()}</div>
          <div class="lsr-info">
            <div class="lsr-name">${r.studentName || r.studentId}</div>
            <div class="lsr-meta">${r.slot || 'Unassigned'} · in since ${ci.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</div>
          </div>
          <div class="live-dot"></div>
        `;
        list.appendChild(row);
      });
    }
  } catch (e) {
    console.error('Live slots error:', e);
    if (e.message && e.message.includes('index')) {
      const linkMatch = e.message.match(/https:\/\/console\.firebase\.google\.com\S+/);
      const link = linkMatch ? linkMatch[0] : null;
      grid.innerHTML = `<div style="color:var(--red);font-size:13px;line-height:1.6;grid-column:1/-1">
        ⚠️ Firestore needs a one-time index for this view.<br>
        ${link ? `<a href="${link}" target="_blank" style="color:var(--orange);word-break:break-all">Click here to create it</a> — then wait 1-2 min and reload.` : 'Check browser console for the index creation link.'}
      </div>`;
    } else {
      grid.innerHTML = `<p style="color:var(--red);font-size:13px;grid-column:1/-1">Error loading live slots: ${e.message}</p>`;
    }
  }
}
window.loadLiveSlots = loadLiveSlots;

function getSyllabusSessionInfo(modId, sessionNum, weeks) {
  if (SYLLABUS_CATALOGUE[modId]) {
    const found = SYLLABUS_CATALOGUE[modId].sessions.find(s => s.num === sessionNum);
    if (found) return found;
  }
  return { num: sessionNum, title: `Session ${sessionNum}`, topics: '' };
}

async function approveSession(studentDocId, modId, sessionNum) {
  try {
    const studentRef = doc(db, 'cadd_students', studentDocId);
    const snap = await getDoc(studentRef);
    if (!snap.exists()) { showToast('Student not found', 'error'); return; }
    const student = snap.data();
    if (!student.modules || !student.modules[modId] || !student.modules[modId].sessions[sessionNum]) {
      showToast('Session data not found', 'error'); return;
    }
    student.modules[modId].sessions[sessionNum] = {
      ...student.modules[modId].sessions[sessionNum],
      approved: true,
      approvedBy: currentFaculty.name,
      approvedAt: Timestamp.now()
    };
    await updateDoc(studentRef, { modules: student.modules });
    showToast('Session approved! Next session unlocked for student.', 'success');
    await loadDashboard();
    if (detailStudentId === studentDocId) await openStudentDetail(studentDocId);
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function rejectSession(studentDocId, modId, sessionNum) {
  if (!confirm('Reject this session tick? The student will need to mark it complete again.')) return;
  try {
    const studentRef = doc(db, 'cadd_students', studentDocId);
    const snap = await getDoc(studentRef);
    if (!snap.exists()) { showToast('Student not found', 'error'); return; }
    const student = snap.data();
    if (!student.modules || !student.modules[modId] || !student.modules[modId].sessions[sessionNum]) {
      showToast('Session data not found', 'error'); return;
    }
    student.modules[modId].sessions[sessionNum] = {
      studentTicked: false, tickedAt: null, approved: false, approvedBy: null, approvedAt: null, autoTicked: false
    };
    await updateDoc(studentRef, { modules: student.modules });
    showToast('Session rejected — sent back to student.', 'warning');
    await loadDashboard();
    if (detailStudentId === studentDocId) await openStudentDetail(studentDocId);
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function openStudentDetail(studentDocId) {
  detailStudentId = studentDocId;
  const s = myStudents.find(x => x.docId === studentDocId);
  if (!s) return;

  document.getElementById('sdModalTitle').textContent = s.name + ' — ' + s.studentId;
  const body = document.getElementById('sdModalBody');
  body.innerHTML = '';

  Object.entries(s.modules || {}).forEach(([modId, mod]) => {
    const isMine = mod.facultyAssignments && mod.facultyAssignments.some(fa => fa.facultyId === currentFaculty.docId);
    if (!isMine) return;

    const sectionTitle = document.createElement('div');
    sectionTitle.style.cssText = 'font-size:13px;font-weight:700;color:var(--orange);margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.5px;';
    sectionTitle.textContent = mod.name;
    body.appendChild(sectionTitle);

    const totalSessions = mod.totalSessions || Object.keys(mod.sessions || {}).length;
    let firstUnlockedSession = 1;
    for (let n = 1; n <= totalSessions; n++) {
      if (mod.sessions[n] && mod.sessions[n].approved) firstUnlockedSession = n + 1;
    }

    for (let n = 1; n <= totalSessions; n++) {
      const sess = mod.sessions[n] || {};
      const myAssignment = getMyAssignmentForSession(mod, n);
      if (!myAssignment) continue;

      const info = getSyllabusSessionInfo(modId, n, mod.weeks);
      let stateClass = 'locked';
      let statusText = 'Locked — waiting on earlier sessions';
      if (sess.approved) { stateClass = 'approved'; statusText = `Approved by ${sess.approvedBy || 'faculty'}`; }
      else if (sess.studentTicked) { stateClass = 'pending'; statusText = sess.autoTicked ? 'Auto-ticked (logout) — pending your approval' : 'Pending your approval'; }
      else if (n === firstUnlockedSession) { stateClass = ''; statusText = 'Unlocked — waiting for student to mark complete'; }

      const row = document.createElement('div');
      row.className = 'session-row ' + stateClass;
      let actionsHtml = '';
      if (stateClass === 'pending') {
        actionsHtml = `
          <button class="btn btn-green btn-sm" onclick="approveSession('${s.docId}','${modId}',${n})">✅</button>
          <button class="btn btn-red btn-sm" onclick="rejectSession('${s.docId}','${modId}',${n})">✕</button>
        `;
      }
      row.innerHTML = `
        <div class="s-num">S${n}</div>
        <div class="session-row-info">
          <div class="session-row-title">${info.title}</div>
          <div class="session-row-status">${statusText}</div>
        </div>
        <div class="session-row-actions">${actionsHtml}</div>
      `;
      body.appendChild(row);
    }
  });

  document.getElementById('studentDetailModal').style.display = 'flex';
}

function closeStudentDetail() {
  document.getElementById('studentDetailModal').style.display = 'none';
  detailStudentId = null;
}

document.getElementById('studentDetailModal').addEventListener('click', (e) => {
  if (e.target.id === 'studentDetailModal') closeStudentDetail();
});
